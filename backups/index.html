<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Udayashree School App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased overflow-x-hidden">
    <!-- Startup Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 z-[100] bg-blue-700 flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-32 h-32 mb-4 animate-bounce-slow">
            <img src="logo.png" class="w-full h-full object-contain drop-shadow-2xl" alt="Logo">
        </div>
        <div class="text-white text-center">
            <h2 class="text-xl font-black tracking-widest uppercase">Udayashree</h2>
            <p class="text-[10px] font-bold opacity-60 tracking-[0.3em] mt-1">SCHOOL APP</p>
        </div>
        <div class="absolute bottom-12">
            <div class="w-6 h-6 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
        </div>
    </div>

    <div id="app" class="flex flex-col h-screen overflow-hidden opacity-0 transition-opacity duration-500">
        
        <!-- Mobile Header -->
        <header id="main-header" class="bg-blue-700 text-white p-4 shadow-md safe-top">
            <div class="flex justify-between items-center">
                <h1 id="page-title" class="text-lg font-bold">Udayashree School</h1>
                <i class="fas fa-bell text-xl"></i>
            </div>
        </header>

        <!-- Main Content Area (Scrollable) -->
        <main id="main-content" class="flex-grow overflow-y-auto pb-24 p-4">
            <!-- Content injected here -->
        </main>

        <!-- Bottom Navigation Bar -->
        <nav id="bottom-nav" class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around items-center py-3 pb-6 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] safe-bottom">
            <button onclick="router('dashboard')" class="nav-item flex flex-col items-center text-blue-700" data-view="dashboard">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs mt-1">Home</span>
            </button>
            <button onclick="router('attendance')" class="nav-item flex flex-col items-center text-gray-400" data-view="attendance">
                <i class="fas fa-calendar-check text-xl"></i>
                <span class="text-xs mt-1">Attend</span>
            </button>
            <button onclick="router('homework')" class="nav-item flex flex-col items-center text-gray-400" data-view="homework">
                <i class="fas fa-book text-xl"></i>
                <span class="text-xs mt-1">Homework</span>
            </button>
            <button onclick="router('notices')" class="nav-item flex flex-col items-center text-gray-400" data-view="notices">
                <i class="fas fa-bullhorn text-xl"></i>
                <span class="text-xs mt-1">Notices</span>
            </button>
            <button onclick="router('profile')" class="nav-item flex flex-col items-center text-gray-400" data-view="profile">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
