<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Udayashree School - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased overflow-x-hidden">
    <div id="app" class="flex flex-col h-screen overflow-hidden">
        <!-- Consistent Mobile Header -->
        <header id="main-header" class="bg-blue-700 text-white p-4 shadow-md safe-top flex justify-between items-center">
            <h1 id="page-title" class="text-lg font-bold">Udayashree School</h1>
            <button onclick="handleLogout()" class="text-white hover:text-red-200 active:scale-95 transition-transform">
                <i class="fas fa-sign-out-alt text-lg"></i>
            </button>
        </header>

        <!-- Dynamic Main Content Area -->
        <main id="main-content" class="flex-grow overflow-y-auto p-4 pb-10">
            <!-- Content gets injected by admin.js -->
        </main>
    </div>

    <!-- Logic scripts -->
    <script src="shared.js"></script>
    <script src="admin.js"></script>
</body>
</html>
