<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Udayashree School - Teacher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased overflow-x-hidden">
    <div id="app" class="flex flex-col h-screen overflow-hidden">
        <!-- Consistent Mobile Header -->
        <header id="main-header" class="bg-blue-700 text-white p-4 shadow-md safe-top flex justify-between items-center">
            <h1 id="page-title" class="text-lg font-bold">Faculty Portal</h1>
            <button onclick="handleLogout()" class="text-white hover:text-red-200 active:scale-95 transition-transform">
                <i class="fas fa-sign-out-alt text-lg"></i>
            </button>
        </header>

        <!-- Dynamic Main Content Area -->
        <main id="main-content" class="flex-grow overflow-y-auto p-4 pb-24">
            <!-- Content gets injected by teacher.js -->
        </main>

        <!-- Bottom Navigation Bar (Persistent for Teachers) -->
        <nav id="bottom-nav" class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around items-center py-3 pb-6 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] safe-bottom">
            <button onclick="teacherRouter('dashboard')" class="nav-item flex flex-col items-center text-blue-700" data-view="dashboard">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs mt-1">Home</span>
            </button>
            <button onclick="teacherRouter('schedule')" class="nav-item flex flex-col items-center text-gray-400" data-view="schedule">
                <i class="fas fa-calendar-day text-xl"></i>
                <span class="text-xs mt-1">Schedule</span>
            </button>
            <button onclick="teacherRouter('attendance')" class="nav-item flex flex-col items-center text-gray-400" data-view="attendance">
                <i class="fas fa-calendar-check text-xl"></i>
                <span class="text-xs mt-1">Attend</span>
            </button>
            <button onclick="teacherRouter('marks')" class="nav-item flex flex-col items-center text-gray-400" data-view="marks">
                <i class="fas fa-file-signature text-xl"></i>
                <span class="text-xs mt-1">Marks</span>
            </button>
            <button onclick="teacherRouter('profile')" class="nav-item flex flex-col items-center text-gray-400" data-view="profile">
                <i class="fas fa-user-tie text-xl"></i>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Logic scripts -->
    <script src="shared.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
